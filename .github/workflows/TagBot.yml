name: TagBot

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: read
      statuses: read
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.TAGBOT_TOKEN != '' && secrets.TAGBOT_TOKEN || secrets.GITHUB_TOKEN }}
